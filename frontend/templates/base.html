<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', secondary: '#10B981' },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out',
                        'slide-up': 'slideUp 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Base styles */
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Glass styling */
        .glass-panel {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* Text Shadow for better contrast */
        .text-glow {
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        
        /* Photo Enhancements */
        .photo-enhanced {
            /* Keeps the image crisp, darkens slightly for text readability */
            filter: brightness(0.55) contrast(1.15) saturate(1.1);
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        
        /* Premium Soft Glow */
        .premium-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: -2;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 transition-colors duration-300 antialiased min-h-screen flex flex-col relative overflow-x-hidden text-glow">
    
    <!-- Full-Screen High-Def Photo Background -->
    <img src="{{ url_for('static', filename='assets/book-bg.jpg') }}" alt="Library Background" class="fixed inset-0 w-full h-full object-cover z-[-3] photo-enhanced">
    
    <!-- Premium Soft Glow Over Video -->
    <div class="premium-glow"></div>
    
    {% if session.get('username') %}
    <!-- Floating Minimal Navbar Split -->
    <div class="fixed top-6 left-0 w-full px-6 md:px-10 z-50 pointer-events-none flex justify-between items-start">
        <!-- Logo Left -->
        <a href="{{ url_for('home') }}" class="pointer-events-auto glass-panel px-5 py-2.5 rounded-full flex items-center group transition-all duration-300 hover:shadow-[0_4px_20px_rgba(79,70,229,0.3)] border border-white/10 bg-black/40 backdrop-blur-xl">
            <div class="p-2 bg-gradient-to-br from-primary/30 to-purple-600/30 rounded-full group-hover:scale-110 transition-transform mr-3 border border-white/10 shadow-inner">
                <ion-icon name="library" class="text-xl text-white"></ion-icon>
            </div>
            <span class="font-extrabold text-lg tracking-wider hidden sm:block bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 drop-shadow-md">SLIBRARY</span>
        </a>
        
        <!-- Icons Right -->
        <div class="pointer-events-auto glass-panel px-3 py-2 rounded-full flex items-center gap-2 border border-white/10 bg-black/40 backdrop-blur-xl transition-all duration-300 hover:shadow-[0_4px_20px_rgba(0,0,0,0.4)]">
            <a href="{{ url_for('home') }}" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-gray-300 hover:text-white hover:bg-primary/20 hover:scale-110 transition-all border border-transparent hover:border-primary/30" title="Dashboard">
                <ion-icon name="home" class="text-lg"></ion-icon>
            </a>
            <a href="{{ url_for('search') }}" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-gray-300 hover:text-white hover:bg-secondary/20 hover:scale-110 transition-all border border-transparent hover:border-secondary/30" title="Search Books">
                <ion-icon name="search" class="text-lg"></ion-icon>
            </a>
            <div class="h-6 w-px bg-white/10 mx-1 hidden sm:block"></div>
            <a href="{{ url_for('logout') }}" class="group flex items-center gap-2 px-4 py-2 rounded-full bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition-all border border-red-500/20 shadow-[0_0_10px_rgba(239,68,68,0.1)] ml-1">
                <ion-icon name="log-out" class="text-lg group-hover:-translate-x-1 transition-transform"></ion-icon> 
                <span class="text-sm font-semibold hidden sm:block">Logout</span>
            </a>
        </div>
    </div>
    {% endif %}
    
    <!-- Main Content -->
    <main class="flex-1 w-full animate-fade-in relative z-10 flex flex-col items-center">
        {% block content %}{% endblock %}
    </main>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

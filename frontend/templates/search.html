{% extends "base.html" %}

{% block content %}
<div class="px-6 py-10 w-full max-w-5xl mx-auto flex flex-col items-center justify-center min-h-[calc(100vh-100px)]">
    <!-- Centered Glassy Container -->
    <div class="w-full glass-panel bg-black/50 backdrop-blur-3xl border border-white/15 p-8 md:p-12 rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.6)] relative overflow-hidden">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-white mb-4 text-glow">
                Smart Search
            </h1>
            <p class="text-gray-300 font-medium text-glow">Instantly find books with smart autocomplete lookups.</p>
        </header>

        <div class="relative w-full max-w-3xl mx-auto mb-12 z-20">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 text-xl">
            <ion-icon name="search-outline"></ion-icon>
        </div>
        <input type="text" id="searchInput" class="w-full pl-12 pr-4 py-4 text-lg bg-white/10 border-2 border-white/20 rounded-2xl focus:ring-4 focus:ring-primary/40 focus:border-primary outline-none transition-all shadow-inner text-white placeholder-gray-300 backdrop-blur-sm" placeholder="Start typing a book title..." autocomplete="off">
        
        <!-- Suggestions Dropdown preview -->
        <div id="suggestions" class="absolute top-full left-0 right-0 mt-2 bg-black/80 backdrop-blur-xl rounded-xl shadow-xl border border-white/20 overflow-hidden hidden z-50">
            <!-- Items injected by JS -->
        </div>
    </div>
    
    <div id="searchResults" class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
        <!-- Results injected by JS -->
    </div>

    <div id="noResults" class="text-center text-gray-300 mt-10 hidden">
        <ion-icon name="sad-outline" class="text-6xl mb-4 opacity-50"></ion-icon>
        <p class="text-xl font-medium">No books found matching your query.</p>
    </div>
    
    </div> <!-- End glassy container -->
</div>
{% endblock %}

{% block scripts %}
<script>
    let debounceTimer;
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const suggestions = document.getElementById('suggestions');
    const noResults = document.getElementById('noResults');

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            if (query.length > 0) {
                fetchResults(query);
            } else {
                searchResults.innerHTML = '';
                suggestions.innerHTML = '';
                suggestions.classList.add('hidden');
                noResults.classList.add('hidden');
            }
        }, 300); // 300ms debounce
    });

    async function fetchResults(query) {
        try {
            const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            renderResults(data);
        } catch (err) {
            console.error(err);
        }
    }

    function renderResults(books) {
        searchResults.innerHTML = '';
        suggestions.innerHTML = '';
        
        if (books.length === 0) {
            suggestions.classList.add('hidden');
            noResults.classList.remove('hidden');
            return;
        }
        
        noResults.classList.add('hidden');
        suggestions.classList.remove('hidden');
        
        books.forEach((book, index) => {
            // Add to dropdown (just first 5)
            if(index < 5) {
                const suggEl = document.createElement('div');
                suggEl.className = 'px-4 py-3 hover:bg-white/10 cursor-pointer border-b border-white/10 last:border-0 text-white transition-colors';
                suggEl.innerHTML = `<span class="font-semibold text-primary">${book.title.substring(0, searchInput.value.length)}</span>${book.title.substring(searchInput.value.length)} <span class="text-xs text-gray-400 ml-2">in ${book.genre}</span>`;
                suggEl.onclick = () => {
                    searchInput.value = book.title;
                    suggestions.classList.add('hidden');
                    // show only this book
                    renderCards([book]);
                };
                suggestions.appendChild(suggEl);
            }
        });
        
        renderCards(books);
    }
    
    function renderCards(books) {
        searchResults.innerHTML = '';
        books.forEach(book => {
            const statusClass = book.available ? 'bg-green-100 text-green-700 dark:bg-green-900/30' : 'bg-red-100 text-red-700 dark:bg-red-900/30';
            const statusIcon = book.available ? 'checkmark-circle' : 'close-circle';
            const statusText = book.available ? 'Available' : 'Issued';
            
            const btnHtml = book.available ? 
                `<button onclick="issueBook('${book.id}')" class="w-full mt-4 bg-primary/20 border border-primary/40 hover:bg-primary text-white py-2.5 rounded-xl transition-all font-bold text-sm flex items-center justify-center shadow-lg hover:shadow-[0_0_20px_rgba(79,70,229,0.5)]"><ion-icon name="library-outline" class="mr-2 text-lg"></ion-icon> Issue Book</button>` 
                : 
                `<button onclick="returnBook('${book.id}')" class="w-full mt-4 bg-white/5 border border-white/10 text-gray-400 hover:text-white py-2.5 rounded-xl transition-all font-bold text-sm hover:bg-white/15 flex items-center justify-center"><ion-icon name="arrow-undo-outline" class="mr-2 text-lg"></ion-icon> Return Book</button>`;

            const card = document.createElement('div');
            card.className = 'glass bg-white/5 p-6 rounded-2xl shadow-sm border border-white/10 book-card flex flex-col justify-between hover:-translate-y-1 transition-transform hover:bg-white/10';
            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-3 py-1 bg-white/10 border border-white/10 text-gray-300 rounded-full text-xs font-bold tracking-wide shadow-inner">${book.genre} - ${book.level}</span>
                        <span class="flex items-center px-2 py-1 rounded-md text-xs font-bold ${statusClass}">
                            <ion-icon name="${statusIcon}" class="mr-1"></ion-icon> ${statusText}
                        </span>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-1 shadow-sm line-clamp-2">${book.title}</h3>
                    <p class="text-sm text-gray-400 mb-4 font-medium">by ${book.author}</p>
                </div>
                <div>
                    ${btnHtml}
                </div>
            `;
            searchResults.appendChild(card);
        });
    }

    // Hide suggestions when clicking outside
    document.addEventListener('click', (e) => {
        if(!searchInput.contains(e.target) && !suggestions.contains(e.target)) {
            suggestions.classList.add('hidden');
        }
    });
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', secondary: '#10B981' },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out',
                        'slide-up': 'slideUp 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Base styles */
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Glass styling */
        .glass-panel {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* Text Shadow for better contrast */
        .text-glow {
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        
        /* Video Enhancements */
        .video-enhanced {
            filter: brightness(1.08) contrast(1.05) saturate(1.1);
        }
        
        /* Premium Soft Glow */
        .premium-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: -2;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 transition-colors duration-300 antialiased min-h-screen flex flex-col relative overflow-x-hidden text-glow">
    
    <!-- Full-Screen Video Background -->
    <video autoplay loop muted playsinline class="fixed inset-0 w-full h-full object-cover z-[-3] video-enhanced">
        <source src="{{ url_for('static', filename='videos/book-animation2.mp4') }}" type="video/mp4">
    </video>
    
    <!-- Premium Soft Glow Over Video -->
    <div class="premium-glow"></div>
    
    {% if session.get('username') %}
    <!-- Top Navbar -->
    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center transition-all duration-300 border-b border-white/5">
        <div class="flex items-center gap-4">
            <a href="{{ url_for('home') }}" class="text-white hover:text-primary transition flex items-center group">
                <div class="p-2 bg-white/5 rounded-lg group-hover:bg-primary/20 transition backdrop-blur-md mr-3">
                    <ion-icon name="library-outline" class="text-xl"></ion-icon>
                </div>
                <span class="font-bold text-xl tracking-wide hidden sm:block">SLibrary</span>
            </a>
            <div class="h-6 w-px bg-white/20 mx-2 hidden sm:block"></div>
            <p class="text-gray-300 text-sm hidden sm:block">Hello, Welcome Back <span class="text-white font-semibold">{{ session.get('username') }}</span> 👋</p>
        </div>
        
        <div class="flex items-center gap-4 relative">
            <a href="{{ url_for('home') }}" class="p-2 text-gray-300 hover:text-white hover:bg-white/10 rounded-lg transition" title="Dashboard">
                <ion-icon name="home-outline" class="text-xl"></ion-icon>
            </a>
            <a href="{{ url_for('logout') }}" class="group flex items-center gap-2 px-4 py-2 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition-all border border-red-500/20 ml-2">
                <ion-icon name="log-out-outline" class="text-lg group-hover:-translate-x-1 transition-transform"></ion-icon> 
                <span class="text-sm font-medium hidden sm:block">Logout</span>
            </a>
        </div>
    </nav>
    {% endif %}
    
    <!-- Main Content -->
    <main class="flex-1 w-full animate-fade-in relative z-10 flex flex-col items-center">
        {% block content %}{% endblock %}
    </main>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

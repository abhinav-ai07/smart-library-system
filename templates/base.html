<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ionicons for modern lightweight icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', secondary: '#10B981' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300 antialiased">
    
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar Navigation -->
        {% if session.get('username') %}
        <aside class="w-64 glass flex-shrink-0 flex flex-col border-r border-gray-200 dark:border-gray-700 z-10 transition-all">
            <div class="h-16 flex items-center px-6 font-bold text-xl text-primary border-b border-gray-200 dark:border-gray-700">
                <ion-icon name="library-outline" class="mr-2"></ion-icon> SLibrary
            </div>
            
            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="{{ url_for('home') }}" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all font-medium text-gray-700 dark:text-gray-300 group">
                    <ion-icon name="home-outline" class="text-xl mr-3 group-hover:text-primary"></ion-icon> Dashboard
                </a>
                <a href="{{ url_for('search') }}" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all font-medium text-gray-700 dark:text-gray-300 group">
                    <ion-icon name="search-outline" class="text-xl mr-3 group-hover:text-primary"></ion-icon> Search Books
                </a>
                <a href="{{ url_for('study_path') }}" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all font-medium text-gray-700 dark:text-gray-300 group">
                    <ion-icon name="git-network-outline" class="text-xl mr-3 group-hover:text-primary"></ion-icon> Study Paths
                </a>
                <a href="{{ url_for('recommend') }}" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all font-medium text-gray-700 dark:text-gray-300 group">
                    <ion-icon name="bulb-outline" class="text-xl mr-3 group-hover:text-primary"></ion-icon> Recommendations
                </a>
                <a href="{{ url_for('history') }}" class="flex items-center px-4 py-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all font-medium text-gray-700 dark:text-gray-300 group">
                    <ion-icon name="time-outline" class="text-xl mr-3 group-hover:text-primary"></ion-icon> History
                </a>
            </nav>
            
            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <button onclick="toggleDarkMode()" class="w-full flex items-center px-4 py-2 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                    <ion-icon name="moon-outline" class="mr-2"></ion-icon> Toggle Theme
                </button>
                <a href="{{ url_for('logout') }}" class="w-full mt-2 flex items-center px-4 py-2 rounded-xl text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <ion-icon name="log-out-outline" class="mr-2"></ion-icon> Logout
                </a>
            </div>
        </aside>
        {% endif %}
        
        <!-- Main Content -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 dark:bg-gray-900 fade-in relative">
            {% block content %}{% endblock %}
        </main>
        
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
